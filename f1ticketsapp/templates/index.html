{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Tickets App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="container">
        <h2>Home</h2>
        <p>Welcome, {{request.user.username}}!</p>
        <a href="{% url 'protected' %}">Go To Your Protected Page!</a>
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </div>
    
    <div class="container centered-content">
    <h1>Purchase F1 Tickets 2025</h1>
    <p>Here you can view and purchase event tickets for F1 races in the 2025 season.</p>
    <img class="logo" src="{% static 'images/f1_logo.jpg' %}" alt="F1 Logo">
    <ul>
        {% for ticket in tickets %}
        <li>{{ticket}}</li>
        {% endfor %}
    </ul>
    <form action="{% url 'contact' %}" method="get">
        <button type="submit" class="indexbtn">Click to Contact Us</button>
    </div></form>
</body>
</html>
