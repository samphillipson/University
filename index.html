<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2024 Formula One Statistics</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>2024 Formula One Season Stats</h1>
    <p>Overview of key statistics from the 2024 season</p>
  </header>

  <main>
    <section id="driver-stats">
      <h2>Top Drivers</h2>
      <ul id="driver-list">
        <!-- Driver data will be inserted here dynamically -->
      </ul>
    </section>

    <section id="constructor-stats">
      <h2>Top Constructors</h2>
      <ul id="constructor-list">
        <!-- Constructor data will be inserted here dynamically -->
      </ul>
    </section>
    
    <section id="race-wins">
      <h2>Race Wins</h2>
      <div id="race-wins-list">
        <!-- Race wins data will be inserted here dynamically -->
      </div>
    </section>
  </main>

  <footer>
    <p>Data powered by <a href="https://www.formula1.com/" target="_blank">Formula 1</a></p>
  </footer>

  <script src="app.js"></script>

</html>
